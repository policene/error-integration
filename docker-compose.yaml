services:

  error-handler:
    container_name: error-handler
    build:
      context: ./error-handler
      dockerfile: Dockerfile
    environment: 
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8080:8080"
    networks:
      - error-integration

  bot-python:
    container_name: bot-python
    build:
      context: ./test-bot
      dockerfile: Dockerfile
    environment:
      - BOT_TOKEN=
      - SERVER_ID=
      - CHANNEL_ID=
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CHANNEL=errorsToSend
    networks:
      - error-integration


  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9094
      - KAFKA_NODE_ID=1
      - CLUSTER_ID=KX3CLZ8wQuuA6KMGZfpAYw
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    networks:
      - error-integration


  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - error-integration

networks:
  error-integration: